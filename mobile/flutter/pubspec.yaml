name: adbar
description: Adbar marketplace mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.1
  dio: ^5.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  socket_io_client: ^2.0.3+1
  cached_network_image: ^3.3.0
  connectivity_plus: ^5.0.2
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
