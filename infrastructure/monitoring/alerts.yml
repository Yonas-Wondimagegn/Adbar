# ============================================================
# Prometheus Alert Rules — Adbar Platform
# ============================================================
groups:
  # ── Service Availability ─────────────────────────────────
  - name: adbar_service_availability
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been down for more than 1 minute."
          runbook_url: "https://wiki.adbar.io/runbooks/service-down"

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
          /
          sum(rate(http_requests_total[5m])) by (job)
          > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.job }} over the last 5 minutes."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job)
          ) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High P95 latency on {{ $labels.job }}"
          description: "P95 latency is {{ $value }}s for {{ $labels.job }}."

  # ── Kubernetes ───────────────────────────────────────────
  - name: adbar_kubernetes
    rules:
      - alert: PodCrashLooping
        expr: |
          increase(kube_pod_container_status_restarts_total[1h]) > 5
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in the last hour."

      - alert: PodNotReady
        expr: |
          kube_pod_status_ready{condition="true", namespace=~"adbar.*"} == 0
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
          description: "Pod has been in a not-ready state for more than 10 minutes."

      - alert: DeploymentReplicasMismatch
        expr: |
          kube_deployment_spec_replicas{namespace=~"adbar.*"}
          !=
          kube_deployment_status_available_replicas{namespace=~"adbar.*"}
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Deployment {{ $labels.deployment }} replica mismatch"
          description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has {{ $value }} available replicas, expected {{ $labels.replicas }}."

      - alert: HPAAtMax
        expr: |
          kube_horizontalpodautoscaler_status_current_replicas{namespace=~"adbar.*"}
          ==
          kube_horizontalpodautoscaler_spec_max_replicas{namespace=~"adbar.*"}
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "HPA {{ $labels.horizontalpodautoscaler }} at max replicas"
          description: "HPA {{ $labels.namespace }}/{{ $labels.horizontalpodautoscaler }} has been at max replicas for 15 minutes."

  # ── Resource Utilization ─────────────────────────────────
  - name: adbar_resources
    rules:
      - alert: HighCPUUsage
        expr: |
          sum(rate(container_cpu_usage_seconds_total{namespace=~"adbar.*", container!=""}[5m])) by (pod, namespace)
          /
          sum(kube_pod_container_resource_limits{namespace=~"adbar.*", resource="cpu"}) by (pod, namespace)
          > 0.85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage on {{ $labels.pod }}"
          description: "CPU usage is above 85% for pod {{ $labels.namespace }}/{{ $labels.pod }}."

      - alert: HighMemoryUsage
        expr: |
          sum(container_memory_working_set_bytes{namespace=~"adbar.*", container!=""}) by (pod, namespace)
          /
          sum(kube_pod_container_resource_limits{namespace=~"adbar.*", resource="memory"}) by (pod, namespace)
          > 0.85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage on {{ $labels.pod }}"
          description: "Memory usage is above 85% for pod {{ $labels.namespace }}/{{ $labels.pod }}."

      - alert: PersistentVolumeSpaceLow
        expr: |
          kubelet_volume_stats_available_bytes{namespace=~"adbar.*"}
          /
          kubelet_volume_stats_capacity_bytes{namespace=~"adbar.*"}
          < 0.15
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Persistent volume {{ $labels.persistentvolumeclaim }} running low"
          description: "Less than 15% space remaining on {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}."

  # ── Database ─────────────────────────────────────────────
  - name: adbar_database
    rules:
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance {{ $labels.instance }} is unreachable."

      - alert: PostgreSQLHighConnections
        expr: |
          pg_stat_activity_count{state="active"}
          /
          pg_settings_max_connections
          > 0.8
        for: 5m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "PostgreSQL high connection count"
          description: "PostgreSQL is using {{ $value | humanizePercentage }} of max connections."

      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag > 30
        for: 5m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "PostgreSQL replication lag"
          description: "Replication lag is {{ $value }}s."

  # ── Redis ────────────────────────────────────────────────
  - name: adbar_redis
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Redis is down"
          description: "Redis instance {{ $labels.instance }} is unreachable."

      - alert: RedisHighMemoryUsage
        expr: |
          redis_memory_used_bytes
          /
          redis_memory_max_bytes
          > 0.9
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis high memory usage"
          description: "Redis memory usage is {{ $value | humanizePercentage }}."

  # ── Blackbox / Endpoint Monitoring ───────────────────────
  - name: adbar_blackbox
    rules:
      - alert: EndpointDown
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Endpoint {{ $labels.instance }} is down"
          description: "HTTP probe failed for {{ $labels.instance }}."

      - alert: EndpointSlow
        expr: probe_http_duration_seconds > 3
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Endpoint {{ $labels.instance }} is slow"
          description: "HTTP response time is {{ $value }}s for {{ $labels.instance }}."

      - alert: SSLCertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 14
        for: 1h
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "SSL certificate expiring soon for {{ $labels.instance }}"
          description: "SSL certificate expires in {{ $value | humanizeDuration }}."
