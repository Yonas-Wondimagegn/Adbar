# ============================================================
# Adbar Platform — Main CI/CD Pipeline
# Triggers: push to main, push to release/*
# ============================================================
name: Adbar CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
      skip_tests:
        description: "Skip test steps"
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  NODE_VERSION: "20"
  TERRAFORM_VERSION: "1.7.5"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────
  # 1. Detect changed services
  # ────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.changes.outputs.api-gateway }}
      web: ${{ steps.changes.outputs.web }}
      auth-service: ${{ steps.changes.outputs.auth-service }}
      marketplace-service: ${{ steps.changes.outputs.marketplace-service }}
      notification-service: ${{ steps.changes.outputs.notification-service }}
      infrastructure: ${{ steps.changes.outputs.infrastructure }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api-gateway:
              - "services/api-gateway/**"
              - "infrastructure/docker/Dockerfile.api-gateway"
            web:
              - "apps/web/**"
              - "infrastructure/docker/Dockerfile.web"
            auth-service:
              - "services/auth-service/**"
              - "infrastructure/docker/Dockerfile.service"
            marketplace-service:
              - "services/marketplace-service/**"
              - "infrastructure/docker/Dockerfile.service"
            notification-service:
              - "services/notification-service/**"
              - "infrastructure/docker/Dockerfile.service"
            infrastructure:
              - "infrastructure/kubernetes/**"
              - "infrastructure/terraform/**"
              - "infrastructure/monitoring/**"

  # ────────────────────────────────────────────────────────
  # 2. Lint
  # ────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service:
          [
            api-gateway,
            web,
            auth-service,
            marketplace-service,
            notification-service,
          ]
      fail-fast: false
    if: needs.detect-changes.outputs[matrix.service] == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service == 'web' && 'apps/web' || format('services/{0}', matrix.service) }}

      - name: Run ESLint
        run: npm run lint
        working-directory: ${{ matrix.service == 'web' && 'apps/web' || format('services/{0}', matrix.service) }}

      - name: Run TypeScript check
        run: npx tsc --noEmit
        working-directory: ${{ matrix.service == 'web' && 'apps/web' || format('services/{0}', matrix.service) }}

  # ────────────────────────────────────────────────────────
  # 3. Unit Tests
  # ────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: inputs.skip_tests != true
    strategy:
      matrix:
        service:
          [
            api-gateway,
            web,
            auth-service,
            marketplace-service,
            notification-service,
          ]
      fail-fast: false
    if: needs.detect-changes.outputs[matrix.service] == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service == 'web' && 'apps/web' || format('services/{0}', matrix.service) }}

      - name: Run unit tests
        run: npm run test -- --coverage
        working-directory: ${{ matrix.service == 'web' && 'apps/web' || format('services/{0}', matrix.service) }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service == 'web' && 'apps/web' || format('services/{0}', matrix.service) }}/coverage/
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # 4. Integration Tests
  # ────────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: inputs.skip_tests != true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start test environment
        run: |
          cd infrastructure/docker
          docker compose -f docker-compose.test.yml up -d --wait --timeout 120

      - name: Run integration tests
        run: |
          cd infrastructure/docker
          docker compose -f docker-compose.test.yml exec -T api-gateway npm run test:integration

      - name: Cleanup test environment
        if: always()
        run: |
          cd infrastructure/docker
          docker compose -f docker-compose.test.yml down -v

  # ────────────────────────────────────────────────────────
  # 5. Security Scan
  # ────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run npm audit
        run: |
          for dir in services/*/ apps/web/; do
            if [ -f "$dir/package.json" ]; then
              echo "Auditing $dir"
              cd "$dir"
              npm audit --audit-level=high || true
              cd -
            fi
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/jwt
            p/secrets
            p/owasp-top-ten

  # ────────────────────────────────────────────────────────
  # 6. Build & Push Docker Images
  # ────────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [integration-test, security-scan]
    if: always() && (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped') && needs.security-scan.result == 'success'
    strategy:
      matrix:
        include:
          - service: api-gateway
            dockerfile: infrastructure/docker/Dockerfile.api-gateway
            context: services/api-gateway
            changed: ${{ needs.detect-changes.outputs.api-gateway }}
          - service: web
            dockerfile: infrastructure/docker/Dockerfile.web
            context: apps/web
            changed: ${{ needs.detect-changes.outputs.web }}
          - service: auth-service
            dockerfile: infrastructure/docker/Dockerfile.service
            context: services/auth-service
            changed: ${{ needs.detect-changes.outputs.auth-service }}
          - service: marketplace-service
            dockerfile: infrastructure/docker/Dockerfile.service
            context: services/marketplace-service
            changed: ${{ needs.detect-changes.outputs.marketplace-service }}
          - service: notification-service
            dockerfile: infrastructure/docker/Dockerfile.service
            context: services/notification-service
            changed: ${{ needs.detect-changes.outputs.notification-service }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/adbar/${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/adbar/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ────────────────────────────────────────────────────────
  # 7. Deploy to Dev
  # ────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'dev'
    environment:
      name: development
      url: https://dev.adbar.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name adbar-dev --region ${{ env.AWS_REGION }}

      - name: Deploy with Kustomize
        run: |
          cd infrastructure/kubernetes/overlays/dev
          kustomize edit set image \
            adbar/api-gateway=${{ env.ECR_REGISTRY }}/adbar/api-gateway:${{ github.sha }} \
            adbar/web=${{ env.ECR_REGISTRY }}/adbar/web:${{ github.sha }}
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl -n adbar-dev rollout status deployment/dev-api-gateway --timeout=300s
          kubectl -n adbar-dev rollout status deployment/dev-web --timeout=300s

      - name: Run smoke tests
        run: |
          curl -sf https://dev-api.adbar.io/health || exit 1
          curl -sf https://dev.adbar.io/api/health || exit 1

  # ────────────────────────────────────────────────────────
  # 8. Deploy to Staging
  # ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.adbar.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name adbar-staging --region ${{ env.AWS_REGION }}

      - name: Deploy with Kustomize
        run: |
          cd infrastructure/kubernetes/overlays/staging
          kustomize edit set image \
            adbar/api-gateway=${{ env.ECR_REGISTRY }}/adbar/api-gateway:${{ github.sha }} \
            adbar/web=${{ env.ECR_REGISTRY }}/adbar/web:${{ github.sha }}
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl -n adbar-staging rollout status deployment/staging-api-gateway --timeout=300s
          kubectl -n adbar-staging rollout status deployment/staging-web --timeout=300s

      - name: Run smoke tests
        run: |
          curl -sf https://staging-api.adbar.io/health || exit 1
          curl -sf https://staging.adbar.io/api/health || exit 1

  # ────────────────────────────────────────────────────────
  # 9. Deploy to Production
  # ────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/heads/release/') || github.event.inputs.environment == 'prod'
    environment:
      name: production
      url: https://adbar.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name adbar-prod --region ${{ env.AWS_REGION }}

      - name: Deploy with Kustomize
        run: |
          cd infrastructure/kubernetes/overlays/prod
          kustomize edit set image \
            adbar/api-gateway=${{ env.ECR_REGISTRY }}/adbar/api-gateway:${{ github.sha }} \
            adbar/web=${{ env.ECR_REGISTRY }}/adbar/web:${{ github.sha }}
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl -n adbar-prod rollout status deployment/prod-api-gateway --timeout=600s
          kubectl -n adbar-prod rollout status deployment/prod-web --timeout=600s

      - name: Run smoke tests
        run: |
          curl -sf https://api.adbar.io/health || exit 1
          curl -sf https://adbar.io/api/health || exit 1

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: "#deployments"
          text: "Production deployment ${{ job.status }} for commit ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
