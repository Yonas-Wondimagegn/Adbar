# ============================================================
# Adbar Platform — PR Checks Pipeline
# Triggers: pull_request to main, staging
# ============================================================
name: Adbar PR Checks

on:
  pull_request:
    branches:
      - main
      - staging
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: "20"

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────
  # 1. Detect changed services
  # ────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.changes.outputs.api-gateway }}
      web: ${{ steps.changes.outputs.web }}
      auth-service: ${{ steps.changes.outputs.auth-service }}
      marketplace-service: ${{ steps.changes.outputs.marketplace-service }}
      notification-service: ${{ steps.changes.outputs.notification-service }}
      infrastructure: ${{ steps.changes.outputs.infrastructure }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api-gateway:
              - "services/api-gateway/**"
              - "infrastructure/docker/Dockerfile.api-gateway"
            web:
              - "apps/web/**"
              - "infrastructure/docker/Dockerfile.web"
            auth-service:
              - "services/auth-service/**"
            marketplace-service:
              - "services/marketplace-service/**"
            notification-service:
              - "services/notification-service/**"
            infrastructure:
              - "infrastructure/kubernetes/**"
              - "infrastructure/terraform/**"
              - "infrastructure/monitoring/**"

  # ────────────────────────────────────────────────────────
  # 2. Lint
  # ────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service:
          [
            api-gateway,
            web,
            auth-service,
            marketplace-service,
            notification-service,
          ]
      fail-fast: false
    if: needs.detect-changes.outputs[matrix.service] == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service == 'web' && 'apps/web' || format('services/{0}', matrix.service) }}

      - name: Run ESLint
        run: npm run lint
        working-directory: ${{ matrix.service == 'web' && 'apps/web' || format('services/{0}', matrix.service) }}

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: ${{ matrix.service == 'web' && 'apps/web' || format('services/{0}', matrix.service) }}

  # ────────────────────────────────────────────────────────
  # 3. Unit Tests
  # ────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    strategy:
      matrix:
        service:
          [
            api-gateway,
            web,
            auth-service,
            marketplace-service,
            notification-service,
          ]
      fail-fast: false
    if: needs.detect-changes.outputs[matrix.service] == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service == 'web' && 'apps/web' || format('services/{0}', matrix.service) }}

      - name: Run unit tests
        run: npm run test -- --coverage
        working-directory: ${{ matrix.service == 'web' && 'apps/web' || format('services/{0}', matrix.service) }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service == 'web' && 'apps/web' || format('services/{0}', matrix.service) }}/coverage/
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # 4. Build Check (verify Docker images build)
  # ────────────────────────────────────────────────────────
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    strategy:
      matrix:
        include:
          - service: api-gateway
            dockerfile: infrastructure/docker/Dockerfile.api-gateway
            context: services/api-gateway
            changed: ${{ needs.detect-changes.outputs.api-gateway }}
          - service: web
            dockerfile: infrastructure/docker/Dockerfile.web
            context: apps/web
            changed: ${{ needs.detect-changes.outputs.web }}
          - service: auth-service
            dockerfile: infrastructure/docker/Dockerfile.service
            context: services/auth-service
            changed: ${{ needs.detect-changes.outputs.auth-service }}
          - service: marketplace-service
            dockerfile: infrastructure/docker/Dockerfile.service
            context: services/marketplace-service
            changed: ${{ needs.detect-changes.outputs.marketplace-service }}
          - service: notification-service
            dockerfile: infrastructure/docker/Dockerfile.service
            context: services/notification-service
            changed: ${{ needs.detect-changes.outputs.notification-service }}
      fail-fast: false
    if: matrix.changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: adbar/${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────
  # 5. Security Scan
  # ────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run npm audit
        run: |
          for dir in services/*/ apps/web/; do
            if [ -f "$dir/package.json" ]; then
              echo "Auditing $dir"
              cd "$dir"
              npm audit --audit-level=high || true
              cd -
            fi
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          format: "table"

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/jwt
            p/secrets
            p/owasp-top-ten

  # ────────────────────────────────────────────────────────
  # 6. Infrastructure Validation
  # ────────────────────────────────────────────────────────
  infra-validate:
    name: Infrastructure Validation
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infrastructure == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Format Check
        run: |
          cd infrastructure/terraform
          terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          cd infrastructure/terraform
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd infrastructure/terraform
          terraform validate

      - name: Kubeconform (K8s manifest validation)
        run: |
          # Install kubeconform
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          ./kubeconform -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            infrastructure/kubernetes/base/

  # ────────────────────────────────────────────────────────
  # 7. PR Summary
  # ────────────────────────────────────────────────────────
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build-check, security-scan, infra-validate]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build-check.result }}"
          echo "Security: ${{ needs.security-scan.result }}"
          echo "Infra: ${{ needs.infra-validate.result }}"

          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.build-check.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.infra-validate.result }}" == "failure" ]]; then
            echo "❌ PR checks failed"
            exit 1
          fi

          echo "✅ All PR checks passed"
