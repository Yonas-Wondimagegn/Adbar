# ============================================================
# Kustomization — Development Overlay
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: adbar-dev

namePrefix: dev-

commonLabels:
  environment: dev

resources:
  - ../../base

images:
  - name: adbar/api-gateway
    newTag: dev-latest
  - name: adbar/web
    newTag: dev-latest

patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: api-gateway
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 500m
                    memory: 256Mi

  - target:
      kind: Deployment
      name: web
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: web
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: web
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 500m
                    memory: 256Mi

  - target:
      kind: Ingress
      name: adbar-ingress
    patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: adbar-ingress
        annotations:
          alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/DEV_CERT_ID
      spec:
        rules:
          - host: dev-api.adbar.io
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: api-gateway
                      port:
                        number: 3000
          - host: dev.adbar.io
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: web
                      port:
                        number: 3000

configMapGenerator:
  - name: adbar-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - NEXT_PUBLIC_API_URL=https://dev-api.adbar.io
      - NEXT_PUBLIC_APP_ENV=development
