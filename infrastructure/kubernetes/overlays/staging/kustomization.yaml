# ============================================================
# Kustomization — Staging Overlay
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: adbar-staging

namePrefix: staging-

commonLabels:
  environment: staging

resources:
  - ../../base

images:
  - name: adbar/api-gateway
    newTag: staging-latest
  - name: adbar/web
    newTag: staging-latest

patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: api-gateway
                resources:
                  requests:
                    cpu: 200m
                    memory: 256Mi
                  limits:
                    cpu: "1"
                    memory: 512Mi

  - target:
      kind: Deployment
      name: web
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: web
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: web
                resources:
                  requests:
                    cpu: 200m
                    memory: 256Mi
                  limits:
                    cpu: "1"
                    memory: 512Mi

  - target:
      kind: Ingress
      name: adbar-ingress
    patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: adbar-ingress
        annotations:
          alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/STAGING_CERT_ID
      spec:
        rules:
          - host: staging-api.adbar.io
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: api-gateway
                      port:
                        number: 3000
          - host: staging.adbar.io
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: web
                      port:
                        number: 3000

configMapGenerator:
  - name: adbar-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - LOG_LEVEL=info
      - NEXT_PUBLIC_API_URL=https://staging-api.adbar.io
      - NEXT_PUBLIC_APP_ENV=staging
