# ============================================================
# Kustomization — Production Overlay
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: adbar-prod

namePrefix: prod-

commonLabels:
  environment: production

resources:
  - ../../base

images:
  - name: adbar/api-gateway
    newTag: prod-latest
  - name: adbar/web
    newTag: prod-latest

patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: api-gateway
                resources:
                  requests:
                    cpu: 500m
                    memory: 512Mi
                  limits:
                    cpu: "2"
                    memory: 1Gi

  - target:
      kind: Deployment
      name: web
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: web
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: web
                resources:
                  requests:
                    cpu: 500m
                    memory: 512Mi
                  limits:
                    cpu: "2"
                    memory: 1Gi

  - target:
      kind: Ingress
      name: adbar-ingress
    patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: adbar-ingress
        annotations:
          alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/PROD_CERT_ID
      spec:
        rules:
          - host: api.adbar.io
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: api-gateway
                      port:
                        number: 3000
          - host: adbar.io
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: web
                      port:
                        number: 3000
          - host: www.adbar.io
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: web
                      port:
                        number: 3000

  - target:
      kind: HorizontalPodAutoscaler
      name: api-gateway-hpa
    patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: api-gateway-hpa
      spec:
        minReplicas: 3
        maxReplicas: 20

  - target:
      kind: HorizontalPodAutoscaler
      name: web-hpa
    patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: web-hpa
      spec:
        minReplicas: 3
        maxReplicas: 20

configMapGenerator:
  - name: adbar-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=warn
      - NEXT_PUBLIC_API_URL=https://api.adbar.io
      - NEXT_PUBLIC_APP_ENV=production
