# ============================================================
# Adbar Secrets Template
# ============================================================
# ⚠️  DO NOT commit real values to version control.
# Use sealed-secrets, external-secrets-operator, or your
# cloud provider's secret manager (AWS Secrets Manager,
# GCP Secret Manager, Azure Key Vault).
#
# This file is a template showing required secret keys.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: adbar-secrets
  namespace: adbar
  labels:
    app.kubernetes.io/part-of: adbar
type: Opaque
stringData:
  # ── Database ────────────────────────────────────────────
  POSTGRES_USER: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"

  # ── Redis ───────────────────────────────────────────────
  REDIS_PASSWORD: "REPLACE_ME"

  # ── Elasticsearch ───────────────────────────────────────
  ELASTICSEARCH_PASSWORD: "REPLACE_ME"

  # ── JWT / Auth ──────────────────────────────────────────
  JWT_SECRET: "REPLACE_ME"
  JWT_REFRESH_SECRET: "REPLACE_ME"

  # ── SMTP ────────────────────────────────────────────────
  SMTP_HOST: "REPLACE_ME"
  SMTP_USER: "REPLACE_ME"
  SMTP_PASSWORD: "REPLACE_ME"

  # ── External Services ───────────────────────────────────
  SENTRY_DSN: "REPLACE_ME"
  ANALYTICS_ID: "REPLACE_ME"

  # ── Object Storage ──────────────────────────────────────
  S3_ACCESS_KEY: "REPLACE_ME"
  S3_SECRET_KEY: "REPLACE_ME"
  S3_BUCKET: "adbar-uploads"
  S3_REGION: "us-east-1"
