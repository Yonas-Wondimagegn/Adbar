# ============================================================
# Adbar Platform — Docker Compose (Production)
# Production-ready compose for staging/self-hosted deployments
# ============================================================
version: "3.9"

x-common-env: &common-env
  NODE_ENV: production
  LOG_LEVEL: info

services:
  # ── PostgreSQL (managed externally in real prod) ────────
  postgres:
    image: postgres:16-alpine
    container_name: adbar-prod-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adbar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-adbar}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adbar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: adbar-prod-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── Elasticsearch ───────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: adbar-prod-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:?ELASTICSEARCH_PASSWORD required}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - cluster.name=adbar-prod-cluster
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTICSEARCH_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ── Kafka ───────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: adbar-prod-kafka
    restart: always
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    depends_on:
      - zookeeper
    ports:
      - "127.0.0.1:9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: adbar-prod-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ── API Gateway ─────────────────────────────────────────
  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: ../../infrastructure/docker/Dockerfile.api-gateway
    image: ${DOCKER_REGISTRY:-adbar}/api-gateway:${IMAGE_TAG:-latest}
    container_name: adbar-prod-api-gateway
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      <<: *common-env
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-adbar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-adbar}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ELASTICSEARCH_URL: http:// elastic:${ELASTICSEARCH_PASSWORD}@elasticsearch:9200
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://adbar.io}
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── Auth Service ────────────────────────────────────────
  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    image: ${DOCKER_REGISTRY:-adbar}/auth-service:${IMAGE_TAG:-latest}
    container_name: adbar-prod-auth-service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-adbar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-adbar}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKERS: kafka:9092
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── Marketplace Service ─────────────────────────────────
  marketplace-service:
    build:
      context: ../services/marketplace-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    image: ${DOCKER_REGISTRY:-adbar}/marketplace-service:${IMAGE_TAG:-latest}
    container_name: adbar-prod-marketplace-service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      <<: *common-env
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-adbar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-adbar}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ELASTICSEARCH_URL: http://elastic:${ELASTICSEARCH_PASSWORD}@elasticsearch:9200
      KAFKA_BROKERS: kafka:9092
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── Notification Service ────────────────────────────────
  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    image: ${DOCKER_REGISTRY:-adbar}/notification-service:${IMAGE_TAG:-latest}
    container_name: adbar-prod-notification-service
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      <<: *common-env
      PORT: 3003
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS: kafka:9092
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ── Web Frontend (Next.js) ──────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: ../../infrastructure/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.adbar.io}
        NEXT_PUBLIC_APP_ENV: production
        NEXT_PUBLIC_ANALYTICS_ID: ${NEXT_PUBLIC_ANALYTICS_ID}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
    image: ${DOCKER_REGISTRY:-adbar}/web:${IMAGE_TAG:-latest}
    container_name: adbar-prod-web
    restart: always
    depends_on:
      - api-gateway
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.adbar.io}
      NEXT_PUBLIC_APP_ENV: production
    ports:
      - "127.0.0.1:3004:3000"
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: adbar-prod-nginx
    restart: always
    depends_on:
      - api-gateway
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

# ── Volumes ───────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  kafka_data:
  zookeeper_data:
